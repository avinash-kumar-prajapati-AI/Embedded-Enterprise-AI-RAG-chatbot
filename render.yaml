services:
  - type: web
    name: rag-chatbot-platform
    runtime: node
    plan: free
    # Render sets NODE_ENV=production for Node services, which makes plain
    # `npm install` skip devDependencies (tailwindcss, @tailwindcss/postcss,
    # typescript, eslint...) — all of which `next build` actually needs.
    # --include=dev forces them in regardless of NODE_ENV.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: ADMIN_LOGIN_ID
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
      - key: DEMO_SITE_KEY
        sync: false
      - key: DEMO_ADMIN_TOKEN
        sync: false

